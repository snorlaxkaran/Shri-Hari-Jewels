# Render Blueprint - one-click deploy for Shri Hari Jewels API
# https://render.com/docs/blueprint-spec
#
# Deploy: Render Dashboard -> New -> Blueprint -> connect snorlaxkaran/Shri-Hari-Jewels

services:
  - type: web
    name: shri-hari-jewels-api
    runtime: node
    region: singapore
    plan: free
    rootDir: server
    branch: main
    buildCommand: npm install --include=dev && npm run build && npm run db:push
    startCommand: npm run start:prod
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: file:./dev.db
      - key: CLIENT_URL
        value: https://shri-hari-jewels.vercel.app
      - key: JWT_SECRET
        generateValue: true
