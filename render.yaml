# Render Blueprint - one-click deploy for Shri Hari Jewels API
# https://render.com/docs/blueprint-spec
#
# Deploy: Render Dashboard -> New -> Blueprint -> connect snorlaxkaran/Shri-Hari-Jewels

services:
  - type: web
    name: shri-hari-jewels-api
    runtime: node
    region: singapore
    plan: free
    rootDir: server
    branch: main
    autoDeploy: true
    buildCommand: npm install --include=dev && npm run build && npm run db:deploy && npm run db:seed-if-empty
    startCommand: npm run start:prod
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      # DATABASE_URL: pooled Supabase URL (port 6543) with ?pgbouncer=true for runtime.
      # DIRECT_URL: direct Supabase URL (port 5432) for db:deploy / prisma db push during build.
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: CLIENT_URL
        value: https://shri-hari-jewels.vercel.app
      - key: JWT_SECRET
        generateValue: true
