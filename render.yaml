# Render Blueprint - one-click deploy for Shri Hari Jewels API
# https://render.com/docs/blueprint-spec
#
# Deploy: Render Dashboard -> New -> Blueprint -> connect snorlaxkaran/Shri-Hari-Jewels

services:
  - type: web
    name: shri-hari-jewels-api
    runtime: node
    region: singapore
    plan: free
    rootDir: server
    branch: main
    buildCommand: npm install --include=dev && npm run build && npm run db:push && npm run db:seed-if-empty
    startCommand: npm run start:prod
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      # Set DATABASE_URL manually in Render dashboard (Prisma Postgres URL).
      # Do NOT use file:./dev.db — SQLite data is wiped when Render restarts.
      - key: DATABASE_URL
        sync: false
      - key: CLIENT_URL
        value: https://shri-hari-jewels.vercel.app
      - key: JWT_SECRET
        generateValue: true
